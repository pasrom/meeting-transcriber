name: Build & Release DMG

on:
  push:
    branches:
      - main
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Swift tests
        run: cd app/MeetingTranscriber && swift test

  build:
    runs-on: macos-26  # Apple Silicon runner (Swift 6.0+)
    needs: test
    permissions:
      contents: write  # For creating GitHub releases

    steps:
      - uses: actions/checkout@v4

      - name: Install Developer ID certificate
        env:
          DEVELOPER_ID_CERT: ${{ secrets.DEVELOPER_ID_CERT }}
          DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        if: env.DEVELOPER_ID_CERT != ''
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          echo -n "$DEVELOPER_ID_CERT" | base64 --decode -o "$CERT_PATH"
          security import "$CERT_PATH" -P "$DEVELOPER_ID_CERT_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add to search list
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Build self-contained .app and DMG
        env:
          DEVELOPER_ID: ${{ secrets.DEVELOPER_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
        run: |
          if [ -n "$DEVELOPER_ID" ]; then
            ./scripts/build_release.sh
          else
            ./scripts/build_release.sh --no-notarize --no-diarize
          fi

      - name: Get version
        id: version
        run: |
          VERSION=$(grep '^version = ' pyproject.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Compute DMG SHA256
        id: sha
        run: |
          DMG=".build/release/MeetingTranscriber-${{ steps.version.outputs.version }}.dmg"
          SHA=$(shasum -a 256 "$DMG" | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "DMG SHA256: $SHA"

      - name: Upload DMG as artifact
        uses: actions/upload-artifact@v4
        with:
          name: MeetingTranscriber-${{ steps.version.outputs.version }}.dmg
          path: .build/release/MeetingTranscriber-${{ steps.version.outputs.version }}.dmg

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: .build/release/MeetingTranscriber-${{ steps.version.outputs.version }}.dmg
          body: |
            ## MeetingTranscriber ${{ steps.version.outputs.version }}

            ### Installation

            **Via Homebrew (recommended):**
            ```bash
            brew tap pasrom/meeting-transcriber
            brew install --cask meeting-transcriber
            ```

            **Manual:**
            1. Download the DMG below
            2. Mount it and drag MeetingTranscriber to Applications

            ### SHA256
            ```
            ${{ steps.sha.outputs.sha256 }}
            ```
          generate_release_notes: true

      - name: Update Homebrew tap with new version and SHA256
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA="${{ steps.sha.outputs.sha256 }}"

          # Clone the tap repo
          git clone https://x-access-token:${GH_TOKEN}@github.com/pasrom/homebrew-meeting-transcriber.git /tmp/tap
          cd /tmp/tap

          # Update version and SHA256 in the formula
          sed -i '' "s/version \".*\"/version \"${VERSION}\"/" Casks/meeting-transcriber.rb
          sed -i '' "s/sha256 \".*\"/sha256 \"${SHA}\"/" Casks/meeting-transcriber.rb

          echo "Updated Cask formula:"
          cat Casks/meeting-transcriber.rb

          # Commit and push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/meeting-transcriber.rb
          git commit -m "Update meeting-transcriber to v${VERSION}"
          git push

      - name: Cleanup keychain
        if: always()
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
