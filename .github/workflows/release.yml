name: Build & Release DMG

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-26  # Apple Silicon runner (Swift 6.0+)
    timeout-minutes: 30
    strategy:
      matrix:
        variant: [homebrew, appstore]
        include:
          - variant: homebrew
            build-flags: ""
            dmg-prefix: "MeetingTranscriber"
          - variant: appstore
            build-flags: "--appstore --no-notarize"
            dmg-prefix: "MeetingTranscriber-AppStore"
    name: build (${{ matrix.variant }})
    permissions:
      contents: write  # For creating GitHub releases

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-tags: true

      - name: Cache SPM dependencies
        uses: actions/cache@v5
        with:
          path: app/MeetingTranscriber/.build
          key: spm-${{ runner.os }}-${{ matrix.variant }}-${{ hashFiles('app/MeetingTranscriber/Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-${{ matrix.variant }}-

      - name: Install Developer ID certificate
        env:
          DEVELOPER_ID_CERT: ${{ secrets.DEVELOPER_ID_CERT }}
          DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        if: env.DEVELOPER_ID_CERT != ''
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          echo -n "$DEVELOPER_ID_CERT" | base64 --decode -o "$CERT_PATH"
          security import "$CERT_PATH" -P "$DEVELOPER_ID_CERT_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add to search list
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Build .app and DMG
        env:
          DEVELOPER_ID: ${{ secrets.DEVELOPER_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
        run: |
          # Use tag name as version (v0.3.0-rc1 → 0.3.0-rc1), fall back to VERSION file
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            BUILD_VERSION="--version=${GITHUB_REF_NAME#v}"
          fi
          if [ "${{ matrix.variant }}" = "homebrew" ] && [ -n "${DEVELOPER_ID:-}" ]; then
            ./scripts/build_release.sh ${BUILD_VERSION:-}
          else
            ./scripts/build_release.sh ${{ matrix.build-flags }} --no-notarize ${BUILD_VERSION:-}
          fi

      - name: Get version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION=$(cat VERSION | tr -d '[:space:]')
          fi
          PRERELEASE=$([[ "${GITHUB_REF_NAME}" == *-* ]] && echo true || echo false)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"

      - name: Compute DMG SHA256
        if: matrix.variant == 'homebrew'
        id: sha
        run: |
          DMG=".build/release/${{ matrix.dmg-prefix }}-${{ steps.version.outputs.version }}.dmg"
          SHA=$(shasum -a 256 "$DMG" | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "DMG SHA256: $SHA"

      - name: Upload DMG as artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.dmg-prefix }}-${{ steps.version.outputs.version }}.dmg
          path: .build/release/${{ matrix.dmg-prefix }}-${{ steps.version.outputs.version }}.dmg
          retention-days: 3

      - name: Find previous release tag for changelog
        if: matrix.variant == 'homebrew' && startsWith(github.ref, 'refs/tags/v')
        id: prev
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURRENT_TAG="${GITHUB_REF_NAME}"
          if [[ "$CURRENT_TAG" == *-* ]]; then
            # Prerelease (RC): find the immediately preceding tag (RC or stable)
            TAG=$(git tag --sort=-v:refname | awk -v cur="$CURRENT_TAG" 'found {print; exit} $0 == cur {found=1}')
          else
            # Stable release: find previous stable release only
            TAG=$(gh release list --exclude-pre-releases --limit 1 --json tagName --jq '.[0].tagName // empty' 2>/dev/null || echo "")
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: matrix.variant == 'homebrew' && startsWith(github.ref, 'refs/tags/v')
        uses: ncipollo/release-action@v1
        with:
          artifacts: .build/release/${{ matrix.dmg-prefix }}-${{ steps.version.outputs.version }}.dmg
          generateReleaseNotes: true
          generateReleaseNotesPreviousTag: ${{ steps.prev.outputs.tag }}
          prerelease: ${{ steps.version.outputs.prerelease }}
          body: |
            ## MeetingTranscriber ${{ steps.version.outputs.version }}

            ### Installation

            **Via Homebrew (recommended):**
            ```bash
            brew tap pasrom/meeting-transcriber
            brew install --cask meeting-transcriber
            ```

            **Manual:**
            1. Download the DMG below
            2. Mount it and drag MeetingTranscriber to Applications

            ### SHA256
            ```
            ${{ steps.sha.outputs.sha256 }}
            ```

      - name: Update Homebrew tap with new version and SHA256
        if: matrix.variant == 'homebrew' && startsWith(github.ref, 'refs/tags/v')
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.TAP_REPO_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA="${{ steps.sha.outputs.sha256 }}"

          DMG=".build/release/MeetingTranscriber-${VERSION}.dmg"

          # Upload DMG to public tap repo (main repo is private)
          gh release create "v${VERSION}" "$DMG" \
            --repo pasrom/homebrew-meeting-transcriber \
            --title "v${VERSION}" \
            --notes "DMG for Homebrew Cask distribution" \
            || gh release upload "v${VERSION}" "$DMG" \
              --repo pasrom/homebrew-meeting-transcriber --clobber

          # Clone the tap repo and update Cask formula
          git clone https://x-access-token:${GH_TOKEN}@github.com/pasrom/homebrew-meeting-transcriber.git /tmp/tap
          cd /tmp/tap

          sed -i '' "s/version \".*\"/version \"${VERSION}\"/" Casks/meeting-transcriber.rb
          sed -i '' "s/sha256 \".*\"/sha256 \"${SHA}\"/" Casks/meeting-transcriber.rb

          echo "Updated Cask formula:"
          cat Casks/meeting-transcriber.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/meeting-transcriber.rb
          git commit -m "Update meeting-transcriber to v${VERSION}"
          git push

      - name: Cleanup keychain
        if: always()
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
