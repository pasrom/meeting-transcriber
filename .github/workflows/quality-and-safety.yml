name: Quality & Safety

# Background QA workflow — runs the expensive Swift checks that don't
# block PRs:
#   - TSan/ASan sanitizer sweeps (catches races/UB the static checker
#     can't see; ~10–15 min per leg).
#   - WER/DER quality regression (downloads ~1 GB of model weights and
#     runs real ASR; produces the baseline artifact future PRs diff
#     against).
#
# Triggers: push to main, nightly cron, and explicit manual dispatch.
# Never runs on pull requests — review iteration stays fast.
on:
  push:
    branches: [main]
  schedule:
    - cron: "0 3 * * *"  # 03:00 UTC = 05:00 CEST
  workflow_dispatch:
    inputs:
      run-sanitizer:
        description: "Run TSan/ASan matrix"
        type: boolean
        default: true
      run-quality:
        description: "Run WER/DER quality regression"
        type: boolean
        default: true

# Main-branch and nightly runs produce baselines (sanitizer reports,
# quality-results.json artifact). Cancelling them on a fresh push would
# lose those baselines, so we don't cancel — let runs accumulate. Manual
# back-to-back dispatches are rare enough that the wasted time isn't
# worth a more complex carve-out.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test-sanitizer:
    if: |
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && inputs.run-sanitizer)
    # Self-hosted Mini absorbs sanitizer instrumentation 4× better than
    # macos-26 GH-hosted (TSan ~6:41 vs ~25 min) and avoids the CoreML
    # model-load assertion race that flaked WhisperKitEngineTests on
    # macos-26. Sanitizer doesn't need the `audio` label, so either Mini
    # runner picks up.
    runs-on: [self-hosted, macOS, ARM64]
    # ~7 min wall-clock observed; 20 min leaves room for cold-build
    # variance while still surfacing runaways before they cost an hour.
    timeout-minutes: 20
    permissions:
      contents: read
      actions: write
    strategy:
      # TSan and ASan find different classes of bugs; one failing leg
      # shouldn't kill the other's diagnostic output.
      fail-fast: false
      matrix:
        variant: [tsan, asan]
        include:
          # ThreadSanitizer catches races the static @Sendable checker can't
          # see — C-pointer shared state, GCD-callback closures over class
          # properties.
          - variant: tsan
            sanitizer-flag: "--sanitize=thread"
          # AddressSanitizer covers the Pointer-heavy code paths Swift's ARC
          # can't help with — AudioTapLib's CATapDescription / IOProc, the
          # `withUnsafePointer` slabs in audio mixing, and any C-imported
          # framework boundary.
          - variant: asan
            sanitizer-flag: "--sanitize=address"
    name: test (${{ matrix.variant }})
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/verify-xcode
      # `mt-ci.keychain-db` is pre-staged by setup-self-hosted-runner.sh, but
      # macOS occasionally drops it from the per-user search list (seen after
      # a second runner's `config.sh` ran as the same OS user). When that
      # happens `SecItemAdd` writes to the default keychain while
      # `SecItemCopyMatching` searches login.keychain only — KeychainHelper
      # tests silent-fail. Re-assert per job; safe under matrix parallelism
      # because every job writes the same value.
      #
      # `set-keychain-settings -lut 36000` raises the auto-lock-on-idle
      # timeout to 10 h. The default ~5 min fired mid-run on the Mini
      # (sanitizer compile ~4 min + slower tests pushed read calls past
      # the threshold), causing `SecItemCopyMatching` to silent-fail with
      # `errSecAuthFailed` between two consecutive reads in
      # `testOpenAIAPIKeyViaKeychainHelper`. Without `-l` the keychain
      # also doesn't lock on system sleep — irrelevant inside a CI job
      # but defensive.
      - name: Ensure CI keychain is default + in search list + unlocked + no-autolock
        run: |
          security default-keychain -s ~/Library/Keychains/mt-ci.keychain-db
          security list-keychains -d user -s \
            ~/Library/Keychains/mt-ci.keychain-db \
            ~/Library/Keychains/login.keychain-db
          security unlock-keychain -p "" ~/Library/Keychains/mt-ci.keychain-db
          security set-keychain-settings -lut 36000 ~/Library/Keychains/mt-ci.keychain-db
      - name: Swift tests
        run: cd app/MeetingTranscriber && swift test --parallel --skip ModelPreloadTests ${{ matrix.sanitizer-flag }}
      - name: Cancel run on failure
        if: failure()
        uses: ./.github/actions/cancel-on-failure

  quality-baseline:
    if: |
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && inputs.run-quality)
    runs-on: macos-26
    timeout-minutes: 45
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v6
      # 20 min covers SPM + ML cache restore plus the cold-cache pre-warm
      # download; well below the 45 min job timeout so a hung download
      # surfaces as a step failure, not a job-timeout.
      - uses: ./.github/actions/setup-swift-test
        timeout-minutes: 20
        with:
          cache-key-suffix: quality
      # Filter explicitly to engine-quality test classes — `--filter Quality`
      # would also pull in `QualityResultsTests`, which exercises the writer
      # via fake rows and would pollute the shared singleton's row buffer.
      # When adding a new engine quality class, append it to the alternation.
      # Pin the model variant explicitly so changes to the in-code default
      # in `WhisperKitEngine.modelVariant` don't silently shift the
      # baseline. When this needs to change, change it here and document
      # the new baseline in the same PR.
      - name: Run quality regression suite
        env:
          RUN_QUALITY_TESTS: "1"
          QUALITY_RESULTS_PATH: ${{ github.workspace }}/quality-results.json
          WHISPERKIT_MODEL: openai_whisper-large-v3-v20240930_turbo
        run: cd app/MeetingTranscriber && swift test --filter "WhisperKitQualityTests|FluidDiarizerQualityTests|ParakeetQualityTests"
      - name: Upload quality results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: quality-results
          path: ${{ github.workspace }}/quality-results.json
          if-no-files-found: warn
      - name: Cancel run on failure
        if: failure()
        uses: ./.github/actions/cancel-on-failure
