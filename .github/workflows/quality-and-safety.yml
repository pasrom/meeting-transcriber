name: Quality & Safety

# Background QA workflow — runs the expensive Swift checks that don't
# block PRs:
#   - TSan/ASan sanitizer sweeps (catches races/UB the static checker
#     can't see; ~10–15 min per leg).
#   - WER/DER quality regression (downloads ~1 GB of model weights and
#     runs real ASR; produces the baseline artifact future PRs diff
#     against).
#
# Triggers: push to main, nightly cron, and explicit manual dispatch.
# Never runs on pull requests — review iteration stays fast.
on:
  push:
    branches: [main]
  schedule:
    - cron: "0 3 * * *"  # 03:00 UTC = 05:00 CEST
  workflow_dispatch:
    inputs:
      run-sanitizer:
        description: "Run TSan/ASan matrix"
        type: boolean
        default: true
      run-quality:
        description: "Run WER/DER quality regression"
        type: boolean
        default: true

# Main-branch and nightly runs produce baselines (sanitizer reports,
# quality-results.json artifact). Cancelling them on a fresh push would
# lose those baselines, so we don't cancel — let runs accumulate. Manual
# back-to-back dispatches are rare enough that the wasted time isn't
# worth a more complex carve-out.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test-sanitizer:
    if: |
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && inputs.run-sanitizer)
    runs-on: [self-hosted, macOS, ARM64]
    timeout-minutes: 60
    permissions:
      contents: read
      actions: write
    env:
      DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
    strategy:
      fail-fast: false
      matrix:
        variant: [tsan]
        include:
          - variant: tsan
            sanitizer-flag: "--sanitize=thread"
    name: test (${{ matrix.variant }})
    steps:
      - uses: actions/checkout@v6
      # 20 min covers SPM + ML cache restore plus the cold-cache pre-warm
      # download; well below the 60 min job timeout so a hung download
      # surfaces as a step failure, not a job-timeout.
      - uses: ./.github/actions/setup-swift-test
        timeout-minutes: 20
        with:
          cache-key-suffix: ${{ matrix.variant }}
      # Self-hosted Mini runs xctest in a non-interactive launchd context
      # where the user's login keychain returns errSecInteractionNotAllowed.
      # Provision an empty, unlocked, ephemeral keychain and make it the
      # default — KeychainHelper-backed tests (`KeychainHelperTests`,
      # `AppSettingsTests`) write/read here without UI prompts. Cleaned up
      # in the always-run teardown step.
      - name: Provision isolated test keychain
        run: |
          set -euo pipefail
          TEST_KC="$RUNNER_TEMP/mt-test.keychain-db"
          rm -f "$TEST_KC"
          security create-keychain -p "" "$TEST_KC"
          security set-keychain-settings -lut 21600 "$TEST_KC"
          security unlock-keychain -p "" "$TEST_KC"
          ORIG=$(security list-keychains -d user | sed -e 's/^[[:space:]]*//' -e 's/"//g' | tr '\n' ' ')
          security list-keychains -d user -s "$TEST_KC" $ORIG
          security default-keychain -s "$TEST_KC"
          echo "TEST_KEYCHAIN_PATH=$TEST_KC" >> "$GITHUB_ENV"
          echo "TEST_KEYCHAIN_ORIG_LIST=$ORIG" >> "$GITHUB_ENV"
      - name: Swift tests
        run: cd app/MeetingTranscriber && swift test --parallel --skip ModelPreloadTests ${{ matrix.sanitizer-flag }}
      - name: Tear down test keychain
        if: always()
        run: |
          set -euo pipefail
          if [[ -n "${TEST_KEYCHAIN_ORIG_LIST:-}" ]]; then
            security list-keychains -d user -s $TEST_KEYCHAIN_ORIG_LIST
            FIRST=$(echo "$TEST_KEYCHAIN_ORIG_LIST" | awk '{print $1}')
            [[ -n "$FIRST" ]] && security default-keychain -s "$FIRST"
          fi
          if [[ -n "${TEST_KEYCHAIN_PATH:-}" ]]; then
            security delete-keychain "$TEST_KEYCHAIN_PATH" 2>/dev/null || true
            rm -f "$TEST_KEYCHAIN_PATH"
          fi
      - name: Cancel run on failure
        if: failure()
        uses: ./.github/actions/cancel-on-failure

  quality-baseline:
    if: |
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && inputs.run-quality)
    runs-on: macos-26
    timeout-minutes: 45
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v6
      # 20 min covers SPM + ML cache restore plus the cold-cache pre-warm
      # download; well below the 45 min job timeout so a hung download
      # surfaces as a step failure, not a job-timeout.
      - uses: ./.github/actions/setup-swift-test
        timeout-minutes: 20
        with:
          cache-key-suffix: quality
      # Filter explicitly to engine-quality test classes — `--filter Quality`
      # would also pull in `QualityResultsTests`, which exercises the writer
      # via fake rows and would pollute the shared singleton's row buffer.
      # When adding a new engine quality class, append it to the alternation.
      # Pin the model variant explicitly so changes to the in-code default
      # in `WhisperKitEngine.modelVariant` don't silently shift the
      # baseline. When this needs to change, change it here and document
      # the new baseline in the same PR.
      - name: Run quality regression suite
        env:
          RUN_QUALITY_TESTS: "1"
          QUALITY_RESULTS_PATH: ${{ github.workspace }}/quality-results.json
          WHISPERKIT_MODEL: openai_whisper-large-v3-v20240930_turbo
        run: cd app/MeetingTranscriber && swift test --filter "WhisperKitQualityTests|FluidDiarizerQualityTests|ParakeetQualityTests"
      - name: Upload quality results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: quality-results
          path: ${{ github.workspace }}/quality-results.json
          if-no-files-found: warn
      - name: Cancel run on failure
        if: failure()
        uses: ./.github/actions/cancel-on-failure
