name: E2E (Production App)

# Live-recording E2E. Background and rationale: CLAUDE.md > E2E Architecture.
# Runner prerequisites: scripts/setup-self-hosted-runner.sh.

on:
  workflow_dispatch:
  # Label-gated PR runs, same-repo branches only. Deliberately
  # `pull_request`, NOT `pull_request_target`: this workflow checks out and
  # executes the PR head on a self-hosted Mac mini with a real signing
  # identity and TCC grants. Fork PRs are excluded entirely (the job `if:`
  # checks head.repo): a label would be a STANDING approval — every later
  # fork push would re-run unreviewed code on the runner — and a fork run
  # would fail anyway, since fork `pull_request` runs get no secrets, the
  # bundle falls back to the self-signed cert, which lacks the Mini's TCC
  # microphone grant, and the leftover consent prompt poisons later runs.
  # To E2E a fork contribution, push it to a same-repo branch and label
  # that PR.
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  push:
    # No paths-filter. Stable-tag ruleset requires a *push*-event check-run
    # on the SHA; `workflow_dispatch`-created check-runs don't satisfy the
    # gate (GitHub quirk — same name + success, still not counted). So
    # every main push fires e2e-app to guarantee the check exists on every
    # SHA a stable tag might point at. Mini Runner #1 is dedicated and
    # otherwise idle — extra runs on docs-only commits are essentially free.
    branches: [main]
  schedule:
    # 04:30 UTC = 06:30 CEST. Offset from the 03:00 quality-and-safety
    # cron so concurrent failures are easy to tell apart in `gh run list`.
    - cron: '30 4 * * *'

# Live-recording E2E mutates host state (deploys the bundle, runs the
# meeting-simulator which plays audio through the speakers). Two parallel
# runs would race for the recorder; serialise.
#
# cancel-in-progress stays false for ALL events, including PR runs: the dev
# app is launched detached (`open`), so a cancelled run cannot clean it up —
# the app would keep recording, hold port 9876, and leave orphaned WAVs that
# crash-recovery feeds into the NEXT run's pipeline assertions. PR runs
# therefore queue instead of superseding. PR events group per PR number so a
# labeled PR never sits in front of a main-push/nightly run (github.ref
# group); mutual exclusion ACROSS groups relies on there being exactly ONE
# `audio`-labeled runner — do not register a second audio runner.
concurrency:
  group: e2e-app-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  e2e-app:
    # Non-PR events (push/schedule/dispatch) always run. PR events run only
    # for same-repo branches carrying the `run-e2e` label (fork PRs never
    # reach the runner — see the trigger comment). The label-name check keeps
    # `labeled` events for any OTHER label from queueing a duplicate run.
    if: |
      github.event_name != 'pull_request' ||
      (
        contains(github.event.pull_request.labels.*.name, 'run-e2e') &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        (github.event.action != 'labeled' || github.event.label.name == 'run-e2e')
      )
    # `audio` label pins the job to the runner that has exclusive access
    # to the BlackHole virtual input device. A second runner on the same
    # Mini handles other self-hosted workloads in parallel without
    # racing for the audio stack — see runner labels via
    # `gh api /repos/{owner}/{repo}/actions/runners`.
    runs-on: [self-hosted, macOS, ARM64, audio]
    # Three transcript lanes (transcript, record-only, reimport) at
    # ~4–6 min each → ~14 min observed. Plus Sortformer naming-dialog
    # (~30 s), channel-health (~30 s), silent-recording (~45 s), live-captions
    # (~2 min), naming-confirm (~4 min typical, up to ~10 min worst case: two
    # 240 s polls + RPC-ready + baseline), crash-recovery (~5 min: record →
    # kill → relaunch → recover → transcribe) → ~26 min wall. The level-sensitive
    # lanes (channel-health, silent-recording, live-captions) run before
    # naming-confirm so its transcribe/diarize load stays off their tight
    # timing windows; crash-recovery stays last. 44 min job budget gives
    # honest margin; each lane has its own step-timeout below so a hang in
    # lane N surfaces as `timed_out` on that step (not as an opaque job-level
    # `cancelled`).
    timeout-minutes: 44

    steps:
      - uses: actions/checkout@v7

      - uses: ./.github/actions/verify-xcode

      # Import the Developer ID Application cert into a temporary keychain
      # so codesign can find it. Apple roots are in the system trust store
      # already, so the Developer ID signature is trusted out of the box —
      # no add-trusted-cert ceremony needed — and the one-time manual TCC
      # grant (keyed on this cert's leaf SHA-1) keeps applying across
      # rebuilds. If the secret isn't set, the action becomes a no-op and
      # e2e-app.sh falls back to the self-signed cert that
      # setup-self-hosted-runner.sh creates.
      - name: Install Developer ID certificate
        id: dev-id
        uses: ./.github/actions/install-developer-id
        with:
          cert: ${{ secrets.DEVELOPER_ID_CERT }}
          cert-password: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
          keychain-name: e2e-signing.keychain-db
          # e2e-app.sh shells out to `codesign` directly to re-sign the
          # deployed bundle; release.yml builds via xcodebuild and doesn't
          # need this extra role.
          extra-partition-roles: "codesign:"

      # Hand the keychain path to e2e-app.sh so it can re-sign the
      # deployed bundle with this cert too. Stable across runs because
      # Apple Developer ID cert SHA doesn't change — TCC keeps the grant.
      - name: Export keychain path for e2e-app.sh
        if: steps.dev-id.outputs.keychain-path != ''
        run: echo "E2E_SIGNING_KEYCHAIN=${{ steps.dev-id.outputs.keychain-path }}" >> "$GITHUB_ENV"

      # Smoke test codesign before kicking off the ~70 s build. The
      # find-identity probe in install-developer-id catches missing/
      # mismatched certs, but `codesign` delegates to trustd for
      # trust-chain validation — a separate code path that can fail
      # (partition-list ACL reset, trustd not respawned for this user)
      # while find-identity still reports "1 valid". Without this,
      # such drift surfaces only after the build burns ~70 s.
      - name: Pre-flight codesign smoke test
        if: env.E2E_SIGNING_KEYCHAIN != ''
        env:
          DEVELOPER_ID: ${{ secrets.DEVELOPER_ID }}
        run: |
          TEST_BIN=$(mktemp)
          trap 'rm -f "$TEST_BIN"' EXIT
          cp /usr/bin/true "$TEST_BIN"
          if ! codesign --force --sign "$DEVELOPER_ID" --keychain "$E2E_SIGNING_KEYCHAIN" "$TEST_BIN"; then
              echo "::error::codesign smoke test failed — likely trustd or partition-list drift on the Mini"
              echo "::error::Recovery: unlock keychain, respawn trustd for this user, re-apply partition-list ACL, then re-run setup-self-hosted-runner.sh"
              exit 1
          fi

      - name: Run live-recording E2E driver
        env:
          DEVELOPER_ID: ${{ secrets.DEVELOPER_ID }}
        timeout-minutes: 10
        # `--two-meetings` always: meeting 1 covers fresh-state single-run,
        # meeting 2 covers cooldown + state reset. ~3 min total wall on Mini
        # vs ~1 min for single-meeting; signal latency is fine on nightly +
        # post-merge push triggers. Local dev runs (`bash scripts/e2e-app.sh`)
        # default to single for fast iteration.
        run: bash scripts/e2e-app.sh --two-meetings

      # Record-only lane: same recorder path, but WatchLoop short-circuits
      # before VAD/transcription/diarization/protocol and writes a sidecar
      # JSON + WAVs to <output>/recordings/ instead. Catches regressions in
      # the WatchLoop record-only branch, sidecar schema, and partial-move
      # behavior that the transcript-asserting lane (above) doesn't exercise.
      # `--no-build` reuses the bundle from the previous step to skip ~30 s
      # of rebuild/re-sign.
      # `--keep-recordings` preserves the produced *_mix.wav across the
      # script's on-exit cleanup so the next step can re-use it instead of
      # recording a fresh meeting. Saves ~30 s of redundant playback +
      # capture and silences the second run on the Mini.
      - name: Run live-recording E2E driver (record-only)
        env:
          DEVELOPER_ID: ${{ secrets.DEVELOPER_ID }}
        timeout-minutes: 10
        run: bash scripts/e2e-app.sh --no-build --record-only --keep-recordings

      # Re-import lane: feeds the WAV from the previous step back into the
      # "Open from Recording" pipeline via POST /action/enqueueFile and
      # asserts the resulting transcript contains the fixture's spoken
      # keyword. Catches three failure classes the lanes above miss in
      # isolation:
      #   - Recorder writes a malformed WAV (record-only would still pass).
      #   - AudioMixer.loadAudioAsFloat32 3-tier fallback regresses
      #     (only fixture-tested today, never live).
      #   - Live capture is silent or garbled (transcript lane uses the
      #     fixture WAV directly, doesn't exercise the recorder output).
      # `--reimport-latest` reuses the WAV from the previous step instead
      # of re-recording one. Recorder-correctness coverage is preserved
      # because the previous step already exercised the recorder under
      # this run's binary.
      - name: Run live-recording E2E driver (re-import recorded WAV)
        env:
          DEVELOPER_ID: ${{ secrets.DEVELOPER_ID }}
        timeout-minutes: 10
        run: bash scripts/e2e-app.sh --no-build --reimport-latest

      # Sortformer-mode naming-dialog lane (Phase 1 of issue #165, PR #325):
      # flips `AppSettings.diarizerMode` to `.sortformer` via UserDefaults
      # pre-pop, runs one meeting, asserts that the speaker-naming dialog
      # actually fires with N>=1 speakers — meaning `DiarizationResult.embeddings`
      # is non-nil end-to-end. Pre-PR-#325 Sortformer mode returned
      # `embeddings: nil` which silently broke the naming flow (issue #109);
      # the env-gated assertion in `scripts/e2e-app.sh` would have caught it.
      # `--no-build` reuses the dev .app from the first step; only the
      # UserDefaults flip + meeting trigger differ. Adds ~30s to total lane.
      - name: Run live-recording E2E driver (Sortformer naming dialog)
        env:
          DEVELOPER_ID: ${{ secrets.DEVELOPER_ID }}
          MTT_DIARIZER_MODE: sortformer
          MTT_EXPECT_NAMING_SPEAKERS_MIN: "1"
        timeout-minutes: 10
        run: bash scripts/e2e-app.sh --no-build

      # Channel-health indicator e2e (issue #258): launches the dev
      # app with `MEETINGTRANSCRIBER_DEBUG_FORCE_MIC_SILENT=1` so
      # `AppState.micSilentActive` is set at init, then asserts the
      # flag surfaces in `/state.channelHealth` via the RPC server.
      # Validates the env-hook → AppState → SwiftUI scene body →
      # MenuBarIcon render → RPC observability chain. Does NOT touch
      # the real audio path (CATapDescription → LevelPublisher →
      # polling task) — that's tracked as a follow-up live-audio e2e.
      - name: Run channel-health indicator E2E
        timeout-minutes: 3
        run: bash scripts/e2e-channel-health.sh --no-build --screenshot

      - name: Upload channel-health menubar screenshot
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: channel-health-menubar
          path: /tmp/e2e-channel-health-menubar.png
          if-no-files-found: ignore

      # Permission-health probe e2e (issue #446): asserts that the Screen
      # Recording and Microphone probes report "healthy" via
      # `/state.permissionHealth` on this granted runner. The runner is a
      # natural reproduction of the #446 false-`.broken` bugs — Screen
      # Recording is granted but the old window-title probe reported broken,
      # and BlackHole (the default input) delivers silent buffers the old
      # amplitude probe reported broken. `continue-on-error` while the mic
      # assertion is validated against the runner's idle BlackHole input;
      # flip to a hard gate once it has been green on a few nightlies.
      # `--no-build` reuses the dev bundle the first e2e-app.sh lane built and
      # signed; it shares the bundle-ID + signing cert with the granted bundle,
      # so the runner's TCC grant applies (continue-on-error hedges a mismatch).
      - name: Run permission-health probe E2E (issue #446)
        timeout-minutes: 3
        continue-on-error: true
        run: bash scripts/e2e-permission-health.sh --no-build

      # Silent-recording detector e2e (PR #295): drives the real
      # production polling chain — meeting-simulator plays the fixture
      # at volume=0 so the CATapDescription tap captures buffers of
      # all-zero content, AppState's 10 Hz polling task accumulates
      # both-silent ticks, and after 30 s of sustained silence
      # `SilentRecordingMonitor` fires `.started` which the script
      # asserts via `/state.channelHealth.recordingSilent`. Unlike
      # `e2e-channel-health.sh` above, this does NOT use a
      # FORCE-flag env hook — reverting `activeRecorder = recorder`
      # in `WatchLoop.handleMeeting` or removing the monitor wiring
      # in AppState makes this step fail. Closes the polling-chain
      # bypass gap from #286.
      # `--no-build` reuses the already-deployed bundle + the
      # meeting-simulator + mt-cli built during the earlier lanes.
      - name: Run silent-recording detector E2E
        timeout-minutes: 3
        run: bash scripts/e2e-silent-recording.sh --no-build

      # Live-transcription overlay e2e (PR #318): asserts on the
      # in-flight LiveCaptionsState exposed at `/state.liveCaptions.
      # recentFinals` rather than the post-pipeline transcript path
      # the first three lanes already cover. Pre-sets the production
      # UserDefaults the toggle reads — no debug env-var shortcut —
      # so a regression in the recorder → live-sink → controller →
      # streaming-transcriber → engine wiring chain surfaces here.
      # The fixture-based xctest E2E in
      # `app/MeetingTranscriber/Tests/LiveTranscriptionE2ETests.swift`
      # covers everything from `LiveTranscriptionController` inward;
      # this lane covers the parts outside the xctest harness (CATap
      # tap, AudioCaptureSession, recorder live-sink wiring).
      # `--no-build` reuses the deployed bundle from the earlier lanes.
      - name: Run live-transcription overlay E2E
        timeout-minutes: 5
        run: bash scripts/e2e-live-captions.sh --no-build

      - name: Upload live-captions simulator log
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: live-captions-simulator.log
          path: /tmp/e2e-live-captions-sim.log
          if-no-files-found: ignore

      # Speaker-naming CONFIRM lane: enqueues the 2-speaker fixture with
      # diarization on and expected speakers = 2, waits for the job to park at
      # speaker-naming (this lane does NOT auto-skip the dialog like every other
      # lane does), then drives GET/POST /v1/jobs/<id>/naming with an anonymous
      # Speaker A / Speaker B mapping and asserts the confirmed names land as
      # transcript speaker labels, the raw diarization labels are gone, and the
      # speaker DB learned the voices. This is the one user flow the other lanes
      # never exercise end-to-end; the confirm path is exactly the bug family
      # the late-rerun transcript-rebuild fix addressed (rename-without-
      # re-segment). Under CI the driver snapshots + restores the runner's real
      # speakers.json / recognition_log.jsonl around the run ($GITHUB_ACTIONS-
      # gated) and verifies the restore, so confirming never pollutes the
      # persistent speaker DB the Sortformer-naming lane depends on.
      # PLACEMENT: this lane runs a full transcribe + diarize + confirm + relabel
      # cycle, so it is deliberately kept AFTER the level-sensitive lanes
      # (channel-health, silent-recording, live-captions) to leave their tight
      # dBFS-timing windows on a quiet machine, and BEFORE crash-recovery so the
      # SIGKILL-and-relaunch teardown stays the final lane (repo policy).
      # `--no-build` reuses the dev bundle the earlier lanes built + signed.
      - name: Run live-recording E2E driver (speaker-naming confirm)
        env:
          DEVELOPER_ID: ${{ secrets.DEVELOPER_ID }}
        # 12 min covers the script's own worst case (two 240 s polls + RPC-ready
        # + baseline + overhead); a tighter budget would SIGKILL through cleanup.
        timeout-minutes: 12
        run: bash scripts/e2e-app.sh --no-build --naming-confirm

      # Crash-recovery lane (issue #379 part 3, PR #385/#386): start a meeting,
      # SIGKILL the app mid-recording (no stop() → orphaned _app16k_raw.tmp +
      # unfinalized _mic.wav, no _mix.wav survive), relaunch, and assert the
      # launch recovery re-mixes the orphan into the pipeline and a job reaches
      # done. Reverting the recovery wiring in DualSourceRecorder/PipelineController
      # makes this fail (the orphan is deleted by launch cleanup, no job lands).
      # Same dispatch-only driver as e2e-crash-recovery.yml, wired here as an
      # always-run regression guard. Kept LAST among the test lanes: it
      # SIGKILLs + relaunches the shared bundle, so running it after every
      # other lane means that teardown can't disrupt them. `--no-build` reuses
      # the bundle the first lane built + signed.
      - name: "Run crash-recovery E2E (issue #379 part 3)"
        env:
          DEVELOPER_ID: ${{ secrets.DEVELOPER_ID }}
        timeout-minutes: 10
        run: bash scripts/e2e-app.sh --no-build --crash-recovery

      # Best-effort: capture the simulator's stdout for post-mortem if
      # the driver failed before tearing it down.
      - name: Upload simulator log
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: meeting-simulator.log
          path: /tmp/e2e-app-sim.log
          if-no-files-found: ignore

      - name: Cleanup signing keychain
        if: always() && env.E2E_SIGNING_KEYCHAIN != ''
        run: security delete-keychain "$E2E_SIGNING_KEYCHAIN" 2>/dev/null || true
