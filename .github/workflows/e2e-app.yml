name: E2E (Production App)

# Live-recording E2E. Background and rationale: CLAUDE.md > E2E Architecture.
# Runner prerequisites: scripts/setup-self-hosted-runner.sh.

on:
  workflow_dispatch:
  push:
    # No paths-filter. Stable-tag ruleset requires a *push*-event check-run
    # on the SHA; `workflow_dispatch`-created check-runs don't satisfy the
    # gate (GitHub quirk — same name + success, still not counted). So
    # every main push fires e2e-app to guarantee the check exists on every
    # SHA a stable tag might point at. Mini Runner #1 is dedicated and
    # otherwise idle — extra runs on docs-only commits are essentially free.
    branches: [main]
  schedule:
    # 04:30 UTC = 06:30 CEST. Offset from the 03:00 quality-and-safety
    # cron so concurrent failures are easy to tell apart in `gh run list`.
    - cron: '30 4 * * *'

# Live-recording E2E mutates host state (deploys the bundle, runs the
# meeting-simulator which plays audio through the speakers). Two parallel
# runs would race for the recorder; serialise.
concurrency:
  group: e2e-app-${{ github.ref }}
  cancel-in-progress: false

jobs:
  e2e-app:
    # `audio` label pins the job to the runner that has exclusive access
    # to the BlackHole virtual input device. A second runner on the same
    # Mini handles other self-hosted workloads in parallel without
    # racing for the audio stack — see runner labels via
    # `gh api /repos/{owner}/{repo}/actions/runners`.
    runs-on: [self-hosted, macOS, ARM64, audio]
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/verify-xcode

      # Import the Developer ID Application cert into a temporary keychain
      # so codesign can find it. Apple roots are in the system trust store
      # already, so the resulting signature satisfies the dev .app's PPPC
      # code requirement out of the box — no add-trusted-cert ceremony
      # needed. If the secret isn't set, the action becomes a no-op and
      # e2e-app.sh falls back to the self-signed path that
      # setup-self-hosted-runner.sh installed.
      - name: Install Developer ID certificate
        id: dev-id
        uses: ./.github/actions/install-developer-id
        with:
          cert: ${{ secrets.DEVELOPER_ID_CERT }}
          cert-password: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
          keychain-name: e2e-signing.keychain-db
          # e2e-app.sh shells out to `codesign` directly to re-sign the
          # deployed bundle; release.yml builds via xcodebuild and doesn't
          # need this extra role.
          extra-partition-roles: "codesign:"

      # Hand the keychain path to e2e-app.sh so it can re-sign the
      # deployed bundle with this cert too. Stable across runs because
      # Apple Developer ID cert SHA doesn't change — TCC keeps the grant.
      - name: Export keychain path for e2e-app.sh
        if: steps.dev-id.outputs.keychain-path != ''
        run: echo "E2E_SIGNING_KEYCHAIN=${{ steps.dev-id.outputs.keychain-path }}" >> "$GITHUB_ENV"

      - name: Run live-recording E2E driver
        env:
          DEVELOPER_ID: ${{ secrets.DEVELOPER_ID }}
        # `--two-meetings` always: meeting 1 covers fresh-state single-run,
        # meeting 2 covers cooldown + state reset. ~3 min total wall on Mini
        # vs ~1 min for single-meeting; signal latency is fine on nightly +
        # post-merge push triggers. Local dev runs (`bash scripts/e2e-app.sh`)
        # default to single for fast iteration.
        run: bash scripts/e2e-app.sh --two-meetings

      # Best-effort: capture the simulator's stdout for post-mortem if
      # the driver failed before tearing it down.
      - name: Upload simulator log
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: meeting-simulator.log
          path: /tmp/e2e-app-sim.log
          if-no-files-found: ignore

      - name: Cleanup signing keychain
        if: always() && env.E2E_SIGNING_KEYCHAIN != ''
        run: security delete-keychain "$E2E_SIGNING_KEYCHAIN" 2>/dev/null || true
