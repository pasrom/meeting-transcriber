name: CI

on:
  push:
    branches: [main, mac]
  pull_request:
    branches: [main]
  # Nightly sanitizer sweep on main — TSan/ASan are too expensive to run on
  # every PR, so we run them once a day instead. Catches regressions within
  # ~24 h, which is acceptable for a solo project.
  schedule:
    - cron: "0 3 * * *"  # 03:00 UTC = 05:00 CEST
  workflow_dispatch:
    inputs:
      run-sanitizer:
        description: "Run TSan/ASan matrix variants for this run"
        type: boolean
        default: false
      run-quality:
        description: "Run WER/DER quality regression suite for this run"
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect whether anything outside docs/markdown changed. The filter only runs
  # for PR events; for push/tag/dispatch the step is skipped, leaving the step
  # output empty, and the job output falls back to 'true' so the full suite
  # always runs on non-PR triggers. Skipped required checks count as success
  # in branch protection, so docs-only PRs stay mergeable.
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      code: ${{ steps.filter.outputs.code || 'true' }}
    steps:
      - if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v4
        id: filter
        with:
          # `every` is required for the exclusion-style filter below: with the
          # v4 default `some`, the `**` catch-all alone marks every file as
          # matched and the `!…` negations never actually exclude anything,
          # so docs-only PRs still trigger the full build/test suite.
          predicate-quantifier: every
          filters: |
            code:
              - '**'
              - '!*.md'
              - '!**/*.md'
              - '!docs/**'
              - '!LICENSE'
              - '!.gitignore'

  lint:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: macos-26
    timeout-minutes: 10
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v6
      - name: Install tools
        run: brew install swiftformat swiftlint
      # SwiftFormat path list lives in scripts/lint.sh; calling it keeps CI and
      # local lint runs aligned. SwiftLint stays an explicit step to use the
      # github-actions-logging reporter (annotations in the PR diff).
      - name: SwiftFormat
        run: bash scripts/lint.sh --format-only
      - name: SwiftLint
        run: swiftlint lint --strict --reporter github-actions-logging
      - name: Build script regression tests
        run: bash scripts/tests/test_build_release_signing.sh
      # Cancels sibling jobs in this run; the workflow-level `concurrency`
      # block only cancels superseded runs of the same ref.
      - name: Cancel run on failure
        if: failure()
        continue-on-error: true
        run: gh run cancel ${{ github.run_id }}
        env:
          GH_TOKEN: ${{ github.token }}

  analyze:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: macos-26
    timeout-minutes: 30
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v6
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Build & Analyze
        run: |
          cd app/MeetingTranscriber
          xcodebuild -scheme MeetingTranscriber -destination 'platform=macOS' build-for-testing 2>&1 | tee /tmp/xcodebuild.log
          cd "$GITHUB_WORKSPACE"
          swiftlint analyze --strict --compiler-log-path /tmp/xcodebuild.log --reporter github-actions-logging
      - name: Cancel run on failure
        if: failure()
        continue-on-error: true
        run: gh run cancel ${{ github.run_id }}
        env:
          GH_TOKEN: ${{ github.token }}

  test:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: macos-26
    timeout-minutes: 30
    permissions:
      contents: read
      actions: write
    strategy:
      matrix:
        variant: [homebrew, appstore]
        include:
          - variant: homebrew
            swift-flags: ""
          - variant: appstore
            swift-flags: "-Xswiftc -DAPPSTORE"
    name: test (${{ matrix.variant }})
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-swift-test
        with:
          cache-key-suffix: ${{ matrix.variant }}
          swift-flags: ${{ matrix.swift-flags }}
      - name: Swift tests
        run: cd app/MeetingTranscriber && swift test --parallel --skip ModelPreloadTests ${{ matrix.swift-flags }}
      - name: Cancel run on failure
        if: failure()
        continue-on-error: true
        run: gh run cancel ${{ github.run_id }}
        env:
          GH_TOKEN: ${{ github.token }}

  # Sanitizers are expensive (TSan ~10-15 min, ASan ~7-10 min on macos-26).
  # Skip on PRs to keep review fast; cover via push to main, nightly cron,
  # and explicit manual dispatch (`gh workflow run ci.yml -f run-sanitizer=true`).
  # ASan + TSan can't run in the same process, so they live as separate legs.
  test-sanitizer:
    needs: changes
    if: |
      needs.changes.outputs.code == 'true' && (
        github.event_name == 'push' ||
        github.event_name == 'schedule' ||
        (github.event_name == 'workflow_dispatch' && inputs.run-sanitizer)
      )
    runs-on: macos-26
    timeout-minutes: 60
    permissions:
      contents: read
      actions: write
    strategy:
      matrix:
        variant: [tsan, asan]
        include:
          # ThreadSanitizer catches races the static @Sendable checker can't
          # see — C-pointer shared state, GCD-callback closures over class
          # properties.
          - variant: tsan
            sanitizer-flag: "--sanitize=thread"
          # AddressSanitizer covers the Pointer-heavy code paths Swift's ARC
          # can't help with — AudioTapLib's CATapDescription / IOProc, the
          # `withUnsafePointer` slabs in audio mixing, and any C-imported
          # framework boundary.
          - variant: asan
            sanitizer-flag: "--sanitize=address"
    name: test (${{ matrix.variant }})
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-swift-test
        with:
          cache-key-suffix: ${{ matrix.variant }}
      - name: Swift tests
        run: cd app/MeetingTranscriber && swift test --parallel --skip ModelPreloadTests ${{ matrix.sanitizer-flag }}
      - name: Cancel run on failure
        if: failure()
        continue-on-error: true
        run: gh run cancel ${{ github.run_id }}
        env:
          GH_TOKEN: ${{ github.token }}

  # WER/DER quality regression suite. Runs the production WhisperKit
  # variant against curated ground-truth fixtures and writes a JSON row
  # per fixture/engine into the uploaded artifact, so future PRs can diff
  # against the main-branch baseline. Skip-default on PRs (loads ~1 GB of
  # model weights and runs real ASR); cover via push to main, nightly
  # cron, and explicit manual dispatch (`gh workflow run ci.yml -f
  # run-quality=true`).
  quality-baseline:
    needs: changes
    if: |
      needs.changes.outputs.code == 'true' && (
        github.event_name == 'push' ||
        github.event_name == 'schedule' ||
        (github.event_name == 'workflow_dispatch' && inputs.run-quality)
      )
    runs-on: macos-26
    timeout-minutes: 45
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-swift-test
        with:
          cache-key-suffix: quality
      # Filter explicitly to engine-quality test classes — `--filter Quality`
      # would also pull in `QualityResultsTests`, which exercises the writer
      # via fake rows and would pollute the shared singleton's row buffer.
      # When adding a new engine quality class, append it to the alternation.
      - name: Run quality regression suite
        env:
          RUN_QUALITY_TESTS: "1"
          QUALITY_RESULTS_PATH: ${{ github.workspace }}/quality-results.json
        run: cd app/MeetingTranscriber && swift test --filter "WhisperKitQualityTests"
      - name: Upload quality results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-results
          path: ${{ github.workspace }}/quality-results.json
          if-no-files-found: warn
      - name: Cancel run on failure
        if: failure()
        continue-on-error: true
        run: gh run cancel ${{ github.run_id }}
        env:
          GH_TOKEN: ${{ github.token }}
