name: CI

on:
  push:
    branches: [main, mac]
  pull_request:
    branches: [main]
  # Manual re-run knob (e.g. to re-trigger lint after a SwiftFormat config
  # bump). Background-QA jobs (sanitizer, quality) live in
  # `quality-and-safety.yml` with their own dispatch UI.
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect whether anything outside docs/markdown changed. The filter only runs
  # for PR events; for push/tag/dispatch the step is skipped, leaving the step
  # output empty, and the job output falls back to 'true' so the full suite
  # always runs on non-PR triggers. Skipped required checks count as success
  # in branch protection, so docs-only PRs stay mergeable.
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      code: ${{ steps.filter.outputs.code || 'true' }}
    steps:
      - if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v4
        id: filter
        with:
          # `every` is required for the exclusion-style filter below: with the
          # v4 default `some`, the `**` catch-all alone marks every file as
          # matched and the `!…` negations never actually exclude anything,
          # so docs-only PRs still trigger the full build/test suite.
          predicate-quantifier: every
          filters: |
            code:
              - '**'
              - '!*.md'
              - '!**/*.md'
              - '!docs/**'
              - '!LICENSE'
              - '!.gitignore'

  lint:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: macos-26
    timeout-minutes: 10
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v6
      - name: Install tools
        run: brew install swiftformat swiftlint
      # SwiftFormat path list lives in scripts/lint.sh; calling it keeps CI and
      # local lint runs aligned. SwiftLint stays an explicit step to use the
      # github-actions-logging reporter (annotations in the PR diff).
      - name: SwiftFormat
        run: bash scripts/lint.sh --format-only
      - name: SwiftLint
        run: swiftlint lint --strict --reporter github-actions-logging
      - name: Build script regression tests
        run: bash scripts/tests/test_build_release_signing.sh
      # Cancels sibling jobs in this run; the workflow-level `concurrency`
      # block only cancels superseded runs of the same ref.
      - name: Cancel run on failure
        if: failure()
        continue-on-error: true
        run: gh run cancel ${{ github.run_id }}
        env:
          GH_TOKEN: ${{ github.token }}

  analyze:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: macos-26
    timeout-minutes: 30
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v6
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Build & Analyze
        run: |
          cd app/MeetingTranscriber
          xcodebuild -scheme MeetingTranscriber -destination 'platform=macOS' build-for-testing 2>&1 | tee /tmp/xcodebuild.log
          cd "$GITHUB_WORKSPACE"
          swiftlint analyze --strict --compiler-log-path /tmp/xcodebuild.log --reporter github-actions-logging
      - name: Cancel run on failure
        if: failure()
        continue-on-error: true
        run: gh run cancel ${{ github.run_id }}
        env:
          GH_TOKEN: ${{ github.token }}

  test:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: macos-26
    timeout-minutes: 30
    permissions:
      contents: read
      actions: write
    strategy:
      matrix:
        variant: [homebrew, appstore]
        include:
          - variant: homebrew
            swift-flags: ""
          - variant: appstore
            swift-flags: "-Xswiftc -DAPPSTORE"
    name: test (${{ matrix.variant }})
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-swift-test
        with:
          cache-key-suffix: ${{ matrix.variant }}
          swift-flags: ${{ matrix.swift-flags }}
      - name: Swift tests
        run: cd app/MeetingTranscriber && swift test --parallel --skip ModelPreloadTests ${{ matrix.swift-flags }}
      - name: Cancel run on failure
        if: failure()
        continue-on-error: true
        run: gh run cancel ${{ github.run_id }}
        env:
          GH_TOKEN: ${{ github.token }}
