name: CI

on:
  push:
    branches: [main, mac]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swift-test:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Swift tests
        run: cd app/MeetingTranscriber && swift test
