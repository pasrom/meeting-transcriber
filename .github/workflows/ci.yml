name: CI

on:
  push:
    branches: [main, mac]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect whether anything outside docs/markdown changed. The filter only runs
  # for PR events; for push/tag/dispatch the step is skipped, leaving the step
  # output empty, and the job output falls back to 'true' so the full suite
  # always runs on non-PR triggers. Skipped required checks count as success
  # in branch protection, so docs-only PRs stay mergeable.
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      code: ${{ steps.filter.outputs.code || 'true' }}
    steps:
      - if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            code:
              - '**'
              - '!*.md'
              - '!**/*.md'
              - '!docs/**'
              - '!LICENSE'
              - '!.gitignore'

  lint:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: macos-26
    timeout-minutes: 10
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v6
      - name: Install tools
        run: brew install swiftformat swiftlint
      - name: SwiftFormat
        run: |
          swiftformat --dryrun --lint \
            app/MeetingTranscriber/Sources \
            app/MeetingTranscriber/Tests \
            tools/audiotap/Sources \
            tools/meeting-simulator/Sources \
            tools/mt-cli/Sources \
            tools/mt-cli/Tests \
            scripts/generate_menu_bar_gifs.swift
      - name: SwiftLint
        run: swiftlint lint --strict --reporter github-actions-logging
      - name: Build script regression tests
        run: bash scripts/tests/test_build_release_signing.sh
      # Cancels sibling jobs in this run; the workflow-level `concurrency`
      # block only cancels superseded runs of the same ref.
      - name: Cancel run on failure
        if: failure()
        continue-on-error: true
        run: gh run cancel ${{ github.run_id }}
        env:
          GH_TOKEN: ${{ github.token }}

  analyze:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: macos-26
    timeout-minutes: 30
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v6
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Build & Analyze
        run: |
          cd app/MeetingTranscriber
          xcodebuild -scheme MeetingTranscriber -destination 'platform=macOS' build-for-testing 2>&1 | tee /tmp/xcodebuild.log
          cd "$GITHUB_WORKSPACE"
          swiftlint analyze --strict --compiler-log-path /tmp/xcodebuild.log --reporter github-actions-logging
      - name: Cancel run on failure
        if: failure()
        continue-on-error: true
        run: gh run cancel ${{ github.run_id }}
        env:
          GH_TOKEN: ${{ github.token }}

  test:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: macos-26
    timeout-minutes: 30
    permissions:
      contents: read
      actions: write
    strategy:
      matrix:
        variant: [homebrew, appstore]
        include:
          - variant: homebrew
            swift-flags: ""
          - variant: appstore
            swift-flags: "-Xswiftc -DAPPSTORE"
    name: test (${{ matrix.variant }})
    steps:
      - uses: actions/checkout@v6
      - name: Cache SPM dependencies
        uses: actions/cache@v5
        with:
          path: app/MeetingTranscriber/.build
          key: spm-${{ runner.os }}-${{ matrix.variant }}-${{ hashFiles('app/MeetingTranscriber/Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-${{ matrix.variant }}-
      # Cache the WhisperKit (HuggingFace) + FluidAudio model files. The
      # HuggingFace download client races on cold-cache concurrent loads of
      # the same variant; pre-warming sequentially populates the cache so
      # the parallel run can hit it. After the first successful CI run the
      # cache is populated and the preload step is skipped.
      - name: Cache ML models
        id: model-cache
        uses: actions/cache@v5
        with:
          path: |
            ~/Documents/huggingface
            ~/Library/Application Support/FluidAudio
          key: ml-models-${{ runner.os }}-${{ hashFiles('app/MeetingTranscriber/Package.resolved') }}-v1
          restore-keys: ml-models-${{ runner.os }}-
      - name: Pre-warm model cache (cache miss only)
        if: steps.model-cache.outputs.cache-hit != 'true'
        run: cd app/MeetingTranscriber && swift test --filter ModelPreloadTests ${{ matrix.swift-flags }}
      - name: Swift tests
        run: cd app/MeetingTranscriber && swift test --parallel --skip ModelPreloadTests ${{ matrix.swift-flags }}
      - name: Cancel run on failure
        if: failure()
        continue-on-error: true
        run: gh run cancel ${{ github.run_id }}
        env:
          GH_TOKEN: ${{ github.token }}
