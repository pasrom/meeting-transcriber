name: CI

on:
  push:
    branches: [main, mac]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: macos-26
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Install tools
        run: brew install swiftformat swiftlint
      - name: SwiftFormat
        run: |
          swiftformat --dryrun --lint \
            app/MeetingTranscriber/Sources \
            app/MeetingTranscriber/Tests \
            tools/audiotap/Sources \
            tools/meeting-simulator/Sources \
            scripts/generate_menu_bar_gifs.swift
      - name: SwiftLint
        run: swiftlint lint --strict --reporter github-actions-logging
      - name: Build script regression tests
        run: bash scripts/tests/test_build_release_signing.sh

  analyze:
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Build & Analyze
        run: |
          cd app/MeetingTranscriber
          xcodebuild -scheme MeetingTranscriber -destination 'platform=macOS' build-for-testing 2>&1 | tee /tmp/xcodebuild.log
          cd "$GITHUB_WORKSPACE"
          swiftlint analyze --strict --compiler-log-path /tmp/xcodebuild.log --reporter github-actions-logging

  test:
    runs-on: macos-26
    timeout-minutes: 30
    strategy:
      matrix:
        variant: [homebrew, appstore]
        include:
          - variant: homebrew
            swift-flags: ""
          - variant: appstore
            swift-flags: "-Xswiftc -DAPPSTORE"
    name: test (${{ matrix.variant }})
    steps:
      - uses: actions/checkout@v6
      - name: Cache SPM dependencies
        uses: actions/cache@v5
        with:
          path: app/MeetingTranscriber/.build
          key: spm-${{ runner.os }}-${{ matrix.variant }}-${{ hashFiles('app/MeetingTranscriber/Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-${{ matrix.variant }}-
      - name: Swift tests
        run: cd app/MeetingTranscriber && swift test ${{ matrix.swift-flags }}
